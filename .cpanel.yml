---
deployment:
  tasks:
    - export DEPLOYPATH=/home/vntauras/public_html
    - /bin/mkdir -p $DEPLOYPATH
    
    # 1. CRITICAL SAFETY: Backup the live database before copying so it doesn't get overwritten by GitHub
    - /bin/cp $DEPLOYPATH/includes/database.sqlite /home/vntauras/vntaura_db_backup.sqlite 2>/dev/null || true
    - /bin/cp $DEPLOYPATH/public/verification_codes.txt /home/vntauras/vntaura_codes_backup.txt 2>/dev/null || true
    
    # 2. Copy all files from the repository to public_html
    - /bin/cp -R * $DEPLOYPATH/
    - /bin/cp -R .htaccess $DEPLOYPATH/ 2>/dev/null || true
    
    # 3. CRITICAL SAFETY: Restore the live database and codes over the newly copied files
    - /bin/cp /home/vntauras/vntaura_db_backup.sqlite $DEPLOYPATH/includes/database.sqlite 2>/dev/null || true
    - /bin/cp /home/vntauras/vntaura_codes_backup.txt $DEPLOYPATH/public/verification_codes.txt 2>/dev/null || true
    
    # 4. Set strict file and folder permissions for security
    - find $DEPLOYPATH -name "*.php" -exec chmod 644 {} \;
    - find $DEPLOYPATH -type d -exec chmod 755 {} \;
    - chmod -R 755 $DEPLOYPATH/storage/ 2>/dev/null || true
    - chmod -R 755 $DEPLOYPATH/uploads/ 2>/dev/null || true
    
    # 5. Clean up unnecessary repository files from the live public_html folder
    - rm -rf $DEPLOYPATH/.git* 2>/dev/null || true
    - rm -f $DEPLOYPATH/*.bat 2>/dev/null || true
    - rm -f $DEPLOYPATH/.cpanel.yml 2>/dev/null || true
    - rm -f $DEPLOYPATH/deploy.log 2>/dev/null || true
